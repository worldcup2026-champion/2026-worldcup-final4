<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>2026 世界盃冠軍預測</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="bg-pitch"></div>

<div class="wrap">

  <section class="hero">
    <span class="eyebrow">FIFA WORLD CUP 2026 · 美加墨</span>
    <h1 id="page-title">2026 世界盃冠軍預測</h1>
    <p class="subtitle" id="page-subtitle">四強對決・誰是真命天子？</p>

    <div class="countdown" id="countdown">
      <div class="unit"><div class="num" id="cd-days">--</div><div class="label">天</div></div>
      <div class="unit"><div class="num" id="cd-hours">--</div><div class="label">時</div></div>
      <div class="unit"><div class="num" id="cd-mins">--</div><div class="label">分</div></div>
      <div class="unit"><div class="num" id="cd-secs">--</div><div class="label">秒</div></div>
    </div>
    <div class="deadline-text">投注截止時間：<b id="deadline-label">--</b></div>
    <div class="closed-banner" id="closed-banner">⏱ 投注已截止</div>
  </section>

  <section class="stats">
    <div class="stat-card">
      <div class="value" id="stat-participants">--</div>
      <div class="label">參與人數</div>
    </div>
    <div class="stat-card">
      <div class="value" id="stat-bets">--</div>
      <div class="label">投注筆數</div>
    </div>
    <div class="stat-card">
      <div class="value" id="stat-total">--</div>
      <div class="label">總投注金額</div>
    </div>
  </section>

  <div class="warn-banner" id="warn-banner"></div>

  <section>
    <div class="section-title">
      <h2>四強對決</h2>
      <button class="refresh-btn" id="refresh-btn">
        <span class="spin">⟳</span> 重新整理資料
      </button>
    </div>
    <div class="teams" id="teams"></div>
    <div class="updated-text" id="updated-text"></div>
  </section>

  <footer>
    資料每 60 秒自動更新一次，或點擊上方「重新整理資料」立即取得最新結果。<br />
    投注資料由主辦人維護於 <code>data/bets.csv</code>。
  </footer>

</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <div class="title"><span class="flag" id="modal-flag"></span><span id="modal-name"></span></div>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="modal-sub" id="modal-sub"></div>
    <ul class="bettor-list" id="modal-list"></ul>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
